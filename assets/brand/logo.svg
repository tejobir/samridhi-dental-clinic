<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Samridhi Dental — lotus and smiling tooth mark">
  <!-- ===== Green base leaves (cradle) ===== -->
  <g fill="#ffffff" stroke="#3aa935" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <path d="M0 0 C -10 -12 -9 -28 0 -38 C 8 -28 8 -13 0 0 Z" transform="translate(50 67) rotate(-98) scale(1.02)"/>
    <path d="M0 0 C -10 -12 -9 -28 0 -38 C 8 -28 8 -13 0 0 Z" transform="translate(50 67) rotate(98) scale(1.02)"/>
    <!-- central upward stem tip -->
    <path d="M0 0 C -3.6 -7 -3.6 -14 0 -19 C 3.6 -14 3.6 -7 0 0 Z" transform="translate(50 80)"/>
  </g>

  <!-- ===== Lotus petals (magenta outline) ===== -->
  <g fill="#ffffff" stroke="#a8228d" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <!-- outer pair -->
    <path d="M0 0 C -7 -15 -5 -30 0 -40 C 5 -30 7 -15 0 0 Z" transform="translate(50 64) rotate(-74) scale(0.72)"/>
    <path d="M0 0 C -7 -15 -5 -30 0 -40 C 5 -30 7 -15 0 0 Z" transform="translate(50 64) rotate(74) scale(0.72)"/>
    <!-- mid pair -->
    <path d="M0 0 C -7 -15 -5 -30 0 -40 C 5 -30 7 -15 0 0 Z" transform="translate(50 64) rotate(-48) scale(0.9)"/>
    <path d="M0 0 C -7 -15 -5 -30 0 -40 C 5 -30 7 -15 0 0 Z" transform="translate(50 64) rotate(48) scale(0.9)"/>
    <!-- inner pair -->
    <path d="M0 0 C -7 -15 -5 -30 0 -40 C 5 -30 7 -15 0 0 Z" transform="translate(50 64) rotate(-24) scale(1)"/>
    <path d="M0 0 C -7 -15 -5 -30 0 -40 C 5 -30 7 -15 0 0 Z" transform="translate(50 64) rotate(24) scale(1)"/>
    <!-- centre petal -->
    <path d="M0 0 C -7.5 -16 -5.5 -33 0 -44 C 5.5 -33 7.5 -16 0 0 Z" transform="translate(50 64)"/>
  </g>

  <!-- ===== Smiling tooth ===== -->
  <g>
    <path d="M37 47 C 37 41.5 43 38 50 38 C 57 38 63 41.5 63 47
             C 63 52 62 56.5 60 60.5 C 59 62.6 56.4 63 55.4 60.4
             C 54.4 57.6 52 56.2 50 58.2 C 48 56.2 45.6 57.6 44.6 60.4
             C 43.6 63 41 62.6 40 60.5 C 38 56.5 37 52 37 47 Z"
          fill="#ffffff" stroke="#231f20" stroke-width="1.9" stroke-linejoin="round"/>
    <!-- blush -->
    <ellipse cx="43" cy="50.5" rx="2.1" ry="1.5" fill="#eba7cf"/>
    <ellipse cx="57" cy="50.5" rx="2.1" ry="1.5" fill="#eba7cf"/>
    <!-- happy eyes -->
    <path d="M44.4 47.4 C 45.2 45.7 47 45.7 47.8 47.4" fill="none" stroke="#231f20" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M52.2 47.4 C 53 45.7 54.8 45.7 55.6 47.4" fill="none" stroke="#231f20" stroke-width="1.5" stroke-linecap="round"/>
    <!-- open smile with tongue -->
    <path d="M46 50.6 C 47.4 54.4 52.6 54.4 54 50.6 C 52 51.4 48 51.4 46 50.6 Z" fill="#231f20"/>
    <path d="M48.4 52.6 C 48.8 51.4 51.2 51.4 51.6 52.6 C 51.2 53.6 48.8 53.6 48.4 52.6 Z" fill="#c0398a"/>
  </g>
</svg>
